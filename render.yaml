# Menopause Wellness App — Render Deployment Config

services:
  - type: web
    name: menopause-wellness
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: GUMROAD_PRODUCT_ID
        sync: false
      - key: GUMROAD_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: menopause-wellness-db
          property: connectionString
    healthCheckPath: /login

databases:
  - name: menopause-wellness-db
    databaseName: menopause_wellness
    user: menopause_wellness_user
