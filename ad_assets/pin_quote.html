<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pinterest Pin — Quote</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f0e8e0; }
  .pin {
    width: 1000px; height: 1500px;
    background: linear-gradient(135deg, #2a1a2e 0%, #1e1a3a 50%, #1a2235 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 3rem; font-family: 'Georgia', 'Times New Roman', serif; position: relative; overflow: hidden;
  }
  .decoration {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; overflow: hidden;
  }
  .decoration .circle1 {
    position: absolute; top: -80px; left: -80px;
    width: 300px; height: 300px; border-radius: 50%;
    border: 2px solid rgba(212,67,107,0.08);
  }
  .decoration .circle2 {
    position: absolute; bottom: -120px; right: -60px;
    width: 400px; height: 400px; border-radius: 50%;
    border: 2px solid rgba(167,139,250,0.06);
  }
  .dots {
    position: absolute; top: 3rem; right: 3rem;
    font-size: 2rem; color: rgba(212,67,107,0.15); letter-spacing: 0.5rem;
  }
  .quote-mark { font-size: 8rem; color: rgba(212,67,107,0.15); font-family: 'Georgia', serif; line-height: 0.5; margin-bottom: 1rem; position: relative; z-index: 1; }
  .quote {
    font-size: 3rem; font-weight: 700; color: #e0e0f0; text-align: center;
    line-height: 1.3; max-width: 700px; position: relative; z-index: 1;
  }
  .quote em { font-style: normal; color: #d4436b; }
  .attribution {
    margin-top: 2rem; font-size: 1.1rem; color: #a0a0c0;
    font-family: 'Arial', sans-serif; text-transform: uppercase; letter-spacing: 0.15em;
    font-weight: 600; position: relative; z-index: 1;
  }
  .sub-line {
    margin-top: 3rem; font-size: 1rem; color: #8080a0;
    text-align: center; max-width: 500px; line-height: 1.6;
    font-family: 'Arial', sans-serif; font-weight: 300; position: relative; z-index: 1;
  }
  .url {
    position: absolute; bottom: 2rem; font-size: 0.8rem; color: #606080;
    font-family: 'Arial', sans-serif; z-index: 1;
  }
</style>
</head>
<body>
<div class="pin">
  <div class="decoration">
    <div class="circle1"></div>
    <div class="circle2"></div>
  </div>
  <div class="dots">✦ ✦ ✦</div>
  <div class="quote-mark">"</div>
  <div class="quote">Your body isn't <em>breaking down</em>.<br>It's <em>upgrading</em>.</div>
  <div class="attribution">— Menopause Wellness</div>
  <div class="sub-line">Isometric exercise + brainwave therapy for women over 50</div>
  <div class="url">menopause-wellness.onrender.com/free-guide</div>
</div>
</body>
</html>
