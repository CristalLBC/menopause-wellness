<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pinterest Pin — Wall Sit</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f0e8e0; }
  .pin {
    width: 1000px; height: 1500px;
    background: linear-gradient(145deg, #1a1a2e, #16213e);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 3rem; font-family: 'Georgia', 'Times New Roman', serif; position: relative; overflow: hidden;
  }
  .pin::before {
    content: ''; position: absolute; top: -100px; right: -100px;
    width: 400px; height: 400px; border-radius: 50%;
    background: radial-gradient(circle, rgba(212,67,107,0.12), transparent);
  }
  .pin::after {
    content: ''; position: absolute; bottom: -150px; left: -100px;
    width: 500px; height: 500px; border-radius: 50%;
    background: radial-gradient(circle, rgba(167,139,250,0.08), transparent);
  }
  .badge {
    background: rgba(212,67,107,0.15); border: 1px solid rgba(212,67,107,0.3);
    color: #f0a0b0; padding: 0.5rem 1.5rem; border-radius: 2rem;
    font-size: 0.9rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em;
    margin-bottom: 2rem; font-family: 'Arial', sans-serif; position: relative; z-index: 1;
  }
  .icon { font-size: 5rem; margin-bottom: 1.5rem; position: relative; z-index: 1; }
  .title {
    font-size: 3rem; font-weight: 700; color: #e0e0f0; text-align: center;
    line-height: 1.2; margin-bottom: 1rem; position: relative; z-index: 1;
  }
  .title em { font-style: normal; color: #d4436b; }
  .subtitle {
    font-size: 1.4rem; color: #a0a0c0; text-align: center; line-height: 1.5;
    margin-bottom: 2.5rem; font-weight: 300; position: relative; z-index: 1;
  }
  .stat-row {
    display: flex; gap: 2rem; margin-bottom: 2rem; position: relative; z-index: 1;
  }
  .stat { text-align: center; }
  .stat .num { font-size: 1.8rem; font-weight: 700; color: #f59e0b; }
  .stat .lbl { font-size: 0.8rem; color: #8080a0; text-transform: uppercase; letter-spacing: 0.05em; margin-top: 0.2rem; }
  .cta {
    background: linear-gradient(135deg, #d4436b, #b8305a); color: white;
    padding: 1rem 3rem; border-radius: 3rem; font-size: 1.1rem; font-weight: 700;
    text-decoration: none; font-family: 'Arial', sans-serif; position: relative; z-index: 1;
    box-shadow: 0 8px 24px rgba(212,67,107,0.3);
  }
  .url {
    position: absolute; bottom: 2rem; font-size: 0.8rem; color: #606080;
    font-family: 'Arial', sans-serif; z-index: 1;
  }
</style>
</head>
<body>
<div class="pin">
  <div class="badge">🏋️ Exercise of the Day</div>
  <div class="icon">🧱</div>
  <div class="title">The <em>Wall Sit</em><br>That Melts Belly Fat</div>
  <div class="subtitle">30 seconds = more metabolic burn<br>than 100 crunches</div>
  <div class="stat-row">
    <div class="stat"><div class="num">3 min</div><div class="lbl">Per day</div></div>
    <div class="stat"><div class="num">2.8 cm</div><div class="lbl">Waist loss in 8 wks</div></div>
    <div class="stat"><div class="num">0</div><div class="lbl">Equipment needed</div></div>
  </div>
  <div class="cta">Get the Free Exercise Guide →</div>
  <div class="url">menopause-wellness.onrender.com/free-guide</div>
</div>
</body>
</html>
